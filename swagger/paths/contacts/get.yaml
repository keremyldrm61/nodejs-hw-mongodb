tags:
  - Contacts
summary: Get all Contacts
operationId: getContacts
description: 'Retrieve a paginated list of contacts for the authenticated user with optional filtering and sorting.'
security:
  - bearerAuth: []
parameters:
  - in: query
    name: page
    schema:
      type: integer
      default: 1
    example: 1
  - in: query
    name: perPage
    schema:
      type: integer
      default: 10
    example: 10
  - in: query
    name: sortBy
    schema:
      type: string
      example: 'name'
    description: 'The field to sort by (e.g., name, createdAt). Default is _id.'
  - in: query
    name: sortOrder
    schema:
      type: string
      enum: ['asc', 'desc']
      default: 'asc'
      example: 'asc'
  - in: query
    name: contactType
    schema:
      type: string
      enum: [work, home, personal]
    description: 'Filter contacts by type'
    example: personal
  - in: query
    name: isFavourite
    schema:
      type: boolean
    description: 'Filter by favorite status'
    example: true
responses:
  '200':
    description: Successfully found contacts!
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully found contacts!
            data:
              type: object
              required:
                - data
                - page
                - perPage
                - totalItems
                - totalPages
                - hasNextPage
                - hasPreviousPage
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/contact.yaml'
                page:
                  type: integer
                  example: 1
                perPage:
                  type: integer
                  example: 10
                totalItems:
                  type: integer
                  example: 45
                totalPages:
                  type: integer
                  example: 5
                hasNextPage:
                  type: boolean
                  example: true
                hasPreviousPage:
                  type: boolean
                  example: false
  '401':
    $ref: '../../components/responses/401.yaml'
