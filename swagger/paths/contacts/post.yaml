tags:
  - Contacts
summary: Create a new contact
operationId: createContact
description: Creates a new contact for the authenticated user
security:
  - bearerAuth: []
requestBody:
  description: Contact details to be created
  required: true
  content:
    multipart/form-data:
      schema:
        type: object
        required:
          - name
          - phoneNumber
          - contactType
        properties:
          name:
            description: 'Full name of the contact'
            type: string
            example: 'John Doe'
          phoneNumber:
            description: "Contact's phone number"
            type: string
            example: '+385551234567'
          email:
            description: "Contact's email address"
            type: string
            example: 'john@example.com'
          isFavourite:
            description: 'Mark the contact as favorite'
            type: boolean
            default: false
            example: false
          contactType:
            description: 'Category of the contact'
            type: string
            enum: [work, home, personal]
            default: personal
            example: personal
          photo:
            description: 'Optional photo file for the contact'
            type: string
            format: binary
responses:
  '201':
    description: Successfully created a contact
    content:
      application/json:
        schema:
          type: object
          properties:
            status:
              type: integer
              example: 201
            message:
              type: string
              example: Successfully created a contact!
            data:
              $ref: '../../components/schemas/contact.yaml'
  '400':
    $ref: '../../components/responses/400.yaml'
  '401':
    $ref: '../../components/responses/401.yaml'
